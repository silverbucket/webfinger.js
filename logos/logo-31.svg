<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <title>webfinger.js - Slim Hand Gold Fill</title>
  <defs>
    <linearGradient id="grad31" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2bb03"/>
      <stop offset="100%" stop-color="#c49b00"/>
    </linearGradient>
  </defs>
  <g transform="translate(10, 2)">
    <!-- Slim hand: single path, index+pinky extended, middle+ring crossed, thumb tucked -->
    <path d="
      M10,30 L8,12 Q7.5,6 10,5 Q12.5,4.5 13,7 L15,24
      L17,14 Q17.5,9 19.5,9.5 Q21.5,10 21,14.5 L19.5,25
      L23,12 Q23.5,7.5 25.5,8 Q27.5,8.5 27,13 L25,27
      L29,9 Q29.5,4 32,3.5 Q34.5,3.5 34,7 L31,28
      Q35,30 37,35 L37,50 Q37,56 33,58 L13,58 Q8,58 7,52 L7,38 Q7,33 10,30 Z
    " fill="url(#grad31)"/>
    <!-- Black detail lines -->
    <g fill="none" stroke="#1a1a1a" stroke-width="0.7" stroke-linecap="round">
      <!-- Finger crossing: ring over middle -->
      <path d="M18,17 Q20.5,15.5 22.5,17.5" opacity="0.45"/>
      <path d="M18,20 Q20.5,18 22.5,20" opacity="0.4"/>
      <!-- Thumb tucked against palm -->
      <path d="M27,33 Q30,31 33,32 Q35,33.5 36,36" opacity="0.45"/>
      <path d="M27,37 Q30,35 33,36" opacity="0.35"/>
      <!-- Finger gaps at base -->
      <line x1="15" y1="24" x2="15" y2="32" opacity="0.3"/>
      <line x1="19.5" y1="25" x2="19.5" y2="32" opacity="0.3"/>
      <line x1="25" y1="27" x2="25" y2="32" opacity="0.3"/>
      <!-- Palm lines -->
      <path d="M10,40 Q18,36 28,40" opacity="0.25"/>
      <path d="M12,47 Q20,44 30,47" opacity="0.2"/>
    </g>
  </g>
  <text x="58" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="#3b351d">webfinger<tspan fill="url(#grad31)">.js</tspan></text>
</svg>