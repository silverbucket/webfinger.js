<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>webfinger.js favicon - Compass-At</title>
  <defs>
    <linearGradient id="grad7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <g transform="translate(16, 16)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="url(#grad7)" stroke-width="1.5" opacity="0.4"/>
    <!-- Cardinal markers -->
    <polygon points="0,-14 -2,-10 2,-10" fill="url(#grad7)" opacity="0.9"/>
    <polygon points="0,14 -1.5,11 1.5,11" fill="url(#grad7)" opacity="0.4"/>
    <polygon points="14,0 11,-1.5 11,1.5" fill="url(#grad7)" opacity="0.4"/>
    <polygon points="-14,0 -11,-1.5 -11,1.5" fill="url(#grad7)" opacity="0.4"/>
    <!-- Center @ -->
    <text x="0" y="3.5" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="700" fill="url(#grad7)">@</text>
  </g>
</svg>