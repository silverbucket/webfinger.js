<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>webfinger.js favicon - Signal Beacon</title>
  <defs>
    <linearGradient id="grad10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <g transform="translate(16, 16)">
    <!-- Tower -->
    <line x1="0" y1="-2" x2="0" y2="10" stroke="url(#grad10)" stroke-width="2" stroke-linecap="round"/>
    <!-- Base -->
    <line x1="0" y1="10" x2="-5" y2="14" stroke="url(#grad10)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="10" x2="5" y2="14" stroke="url(#grad10)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Beacon dot -->
    <circle cx="0" cy="-4" r="2.5" fill="url(#grad10)"/>
    <!-- Signal arcs -->
    <path d="M-5,-9 A7,7 0 0,1 -6,-2" fill="none" stroke="url(#grad10)" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <path d="M5,-9 A7,7 0 0,0 6,-2" fill="none" stroke="url(#grad10)" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <path d="M-9,-11 A11,11 0 0,1 -10,0" fill="none" stroke="url(#grad10)" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
    <path d="M9,-11 A11,11 0 0,0 10,0" fill="none" stroke="url(#grad10)" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
  </g>
</svg>