<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>webfinger.js favicon - Network Nodes</title>
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <!-- Connection lines -->
  <line x1="16" y1="16" x2="5" y2="6" stroke="url(#grad3)" stroke-width="1" opacity="0.3"/>
  <line x1="16" y1="16" x2="27" y2="5" stroke="url(#grad3)" stroke-width="1" opacity="0.3"/>
  <line x1="16" y1="16" x2="28" y2="22" stroke="url(#grad3)" stroke-width="1" opacity="0.3"/>
  <line x1="16" y1="16" x2="6" y2="26" stroke="url(#grad3)" stroke-width="1" opacity="0.3"/>
  <!-- Outer nodes -->
  <circle cx="5" cy="6" r="2.5" fill="none" stroke="url(#grad3)" stroke-width="1.2" opacity="0.5"/>
  <circle cx="27" cy="5" r="2" fill="none" stroke="url(#grad3)" stroke-width="1.2" opacity="0.5"/>
  <circle cx="28" cy="22" r="2" fill="none" stroke="url(#grad3)" stroke-width="1.2" opacity="0.4"/>
  <circle cx="6" cy="26" r="2" fill="none" stroke="url(#grad3)" stroke-width="1.2" opacity="0.4"/>
  <!-- Central node -->
  <circle cx="16" cy="16" r="7" fill="url(#grad3)" opacity="0.15"/>
  <circle cx="16" cy="16" r="7" fill="none" stroke="url(#grad3)" stroke-width="1.5"/>
  <text x="16" y="20" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="700" fill="url(#grad3)">@</text>
</svg>