<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <title>webfinger.js - Radial Ripple Logo</title>
  <defs>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <g transform="translate(40, 40)">
    <!-- Ripple rings - expanding outward -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#grad5)" stroke-width="1" opacity="0.12" stroke-dasharray="4 3"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#grad5)" stroke-width="1.2" opacity="0.2" stroke-dasharray="5 3"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="url(#grad5)" stroke-width="1.5" opacity="0.35"/>
    <!-- Inner glow -->
    <circle cx="0" cy="0" r="10" fill="url(#grad5)" opacity="0.08"/>
    <!-- Central @ -->
    <text x="0" y="6" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="url(#grad5)">@</text>
  </g>
  <!-- Wordmark -->
  <text x="85" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="#2d3748">webfinger<tspan fill="url(#grad5)">.js</tspan></text>
</svg>