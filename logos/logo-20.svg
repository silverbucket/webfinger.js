<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <title>webfinger.js - Elegant @ Swirl</title>
  <defs>
    <linearGradient id="grad20" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2bb03"/>
      <stop offset="40%" stop-color="#d4a017"/>
      <stop offset="70%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="grad20g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2bb03"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
    <linearGradient id="grad20p" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <g transform="translate(40, 40)">
    <!-- Elegant @ symbol drawn as a flowing calligraphic stroke -->
    <!-- Outer spiral -->
    <path d="M16,-2 C16,-12 8,-20 -2,-20 C-14,-20 -22,-12 -22,0 C-22,12 -14,22 -2,22 C6,22 12,18 16,12"
      fill="none" stroke="url(#grad20)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Inner loop of @ -->
    <path d="M16,12 L16,-2 C16,-2 14,-10 6,-10 C-2,-10 -6,-4 -6,2 C-6,8 -2,12 4,12 C10,12 14,8 16,4"
      fill="none" stroke="url(#grad20)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Decorative tail extending right -->
    <path d="M16,12 C18,14 22,16 26,14 Q30,12 28,8"
      fill="none" stroke="url(#grad20g)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <!-- Small sparkle accents -->
    <circle cx="-22" cy="0" r="1.5" fill="url(#grad20p)" opacity="0.4"/>
    <circle cx="28" cy="8" r="1.5" fill="url(#grad20g)" opacity="0.4"/>
  </g>
  <!-- Wordmark -->
  <text x="82" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="#3b351d">webfinger<tspan fill="url(#grad20p)">.js</tspan></text>
</svg>