<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <title>webfinger.js - Pointing Hand Logo</title>
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <!-- Pointing hand mark -->
  <g transform="translate(12, 14)" fill="none" stroke="url(#grad2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Index finger pointing right -->
    <path d="M22,30 L52,30 Q58,30 58,26 Q58,22 52,22 L36,22"/>
    <!-- Other fingers curled -->
    <path d="M22,30 L22,38 Q22,44 28,44 L32,44 Q36,44 36,40 L36,36"/>
    <path d="M36,36 Q36,44 40,46 L42,46 Q46,46 46,42 L46,36"/>
    <path d="M46,36 L46,42 Q46,48 50,48 Q54,48 54,44 L54,36"/>
    <!-- Thumb -->
    <path d="M22,22 L22,18 Q22,14 26,14 L30,14 Q34,14 34,18 L34,22"/>
    <!-- Signal arcs from fingertip -->
    <path d="M62,26 A6,6 0 0,1 62,30" stroke="url(#grad2)" stroke-width="1.5" opacity="0.7"/>
    <path d="M66,22 A10,10 0 0,1 66,34" stroke="url(#grad2)" stroke-width="1.5" opacity="0.5"/>
    <path d="M70,18 A14,14 0 0,1 70,38" stroke="url(#grad2)" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Wordmark -->
  <text x="95" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="#2d3748">webfinger<tspan fill="url(#grad2)">.js</tspan></text>
</svg>