<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <title>webfinger.js - Golden Hand Modernized</title>
  <defs>
    <linearGradient id="grad11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2bb03"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
    <linearGradient id="grad11b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <!-- Stylized pointing hand inspired by original - simplified geometric -->
  <g transform="translate(8, 8)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Index finger extended right -->
    <path d="M20,34 L48,34 C52,34 54,32 54,30 C54,28 52,26 48,26 L32,26" stroke="url(#grad11)" stroke-width="2.5" fill="url(#grad11)" fill-opacity="0.12"/>
    <!-- Curled fingers -->
    <path d="M20,34 L20,42 C20,46 22,48 26,48 L30,48 C33,48 35,46 35,42 L35,38" stroke="url(#grad11)" stroke-width="2" fill="url(#grad11)" fill-opacity="0.08"/>
    <path d="M35,38 L35,44 C35,48 37,50 40,50 C43,50 45,48 45,44 L45,38" stroke="url(#grad11)" stroke-width="2" fill="url(#grad11)" fill-opacity="0.06"/>
    <!-- Thumb -->
    <path d="M20,26 L20,20 C20,16 22,14 26,14 L28,14 C31,14 32,16 32,20 L32,26" stroke="url(#grad11)" stroke-width="2" fill="url(#grad11)" fill-opacity="0.08"/>
    <!-- Signal dots from fingertip -->
    <circle cx="58" cy="30" r="1.5" fill="#e2bb03" opacity="0.8"/>
    <circle cx="63" cy="30" r="1.2" fill="#e2bb03" opacity="0.5"/>
    <circle cx="67" cy="30" r="0.9" fill="#e2bb03" opacity="0.3"/>
  </g>
  <!-- Wordmark -->
  <text x="82" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="#3b351d">webfinger<tspan fill="url(#grad11)">.js</tspan></text>
</svg>