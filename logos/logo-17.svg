<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <title>webfinger.js - Dual Tone Monogram</title>
  <defs>
    <linearGradient id="grad17g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2bb03"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
    <linearGradient id="grad17p" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <g transform="translate(40, 40)">
    <!-- Rounded square container -->
    <rect x="-24" y="-24" width="48" height="48" rx="12" fill="url(#grad17p)" opacity="0.08"/>
    <rect x="-24" y="-24" width="48" height="48" rx="12" fill="none" stroke="url(#grad17p)" stroke-width="1.5" opacity="0.3"/>
    <!-- "wf" monogram -->
    <text x="-8" y="4" font-family="'Georgia', 'Times New Roman', serif" font-size="24" font-weight="700" fill="url(#grad17g)" letter-spacing="-2">w</text>
    <text x="8" y="4" font-family="'Georgia', 'Times New Roman', serif" font-size="24" font-weight="700" fill="url(#grad17p)" letter-spacing="-2">f</text>
    <!-- Small dot accent -->
    <circle cx="18" cy="-12" r="2.5" fill="url(#grad17g)" opacity="0.6"/>
  </g>
  <!-- Wordmark -->
  <text x="82" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="#3b351d">webfinger<tspan fill="url(#grad17p)">.js</tspan></text>
</svg>