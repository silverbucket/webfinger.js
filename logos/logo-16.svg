<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <title>webfinger.js - Golden Shield Badge</title>
  <defs>
    <linearGradient id="grad16g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0d040"/>
      <stop offset="50%" stop-color="#e2bb03"/>
      <stop offset="100%" stop-color="#c49b00"/>
    </linearGradient>
    <linearGradient id="grad16p" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <g transform="translate(40, 40)">
    <!-- Shield/badge shape -->
    <path d="M0,-26 L20,-18 L20,4 C20,16 10,24 0,28 C-10,24 -20,16 -20,4 L-20,-18 Z" fill="url(#grad16g)" fill-opacity="0.1" stroke="url(#grad16g)" stroke-width="2" stroke-linejoin="round"/>
    <!-- Inner border -->
    <path d="M0,-20 L15,-14 L15,2 C15,12 8,18 0,22 C-8,18 -15,12 -15,2 L-15,-14 Z" fill="none" stroke="url(#grad16g)" stroke-width="0.8" opacity="0.3"/>
    <!-- Finger/hand pointing up inside shield -->
    <g opacity="0.7">
      <path d="M0,-12 L0,6" stroke="url(#grad16p)" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="-14" r="3" fill="url(#grad16p)" opacity="0.3"/>
      <circle cx="0" cy="-14" r="3" fill="none" stroke="url(#grad16p)" stroke-width="1.2"/>
      <!-- Small signal lines -->
      <path d="M-6,-14 L-4,-14" stroke="url(#grad16p)" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
      <path d="M4,-14 L6,-14" stroke="url(#grad16p)" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
      <path d="M0,-20 L0,-18" stroke="url(#grad16p)" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
      <!-- Base -->
      <path d="M-5,6 L5,6" stroke="url(#grad16p)" stroke-width="2" stroke-linecap="round"/>
      <path d="M-7,10 L7,10" stroke="url(#grad16p)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    </g>
  </g>
  <!-- Wordmark -->
  <text x="78" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="#3b351d">webfinger<tspan fill="url(#grad16g)">.js</tspan></text>
</svg>