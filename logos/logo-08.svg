<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <title>webfinger.js - Fingerprint Globe Logo</title>
  <defs>
    <linearGradient id="grad8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <g transform="translate(40, 40)">
    <!-- Globe outline -->
    <circle cx="0" cy="0" r="24" fill="none" stroke="url(#grad8)" stroke-width="2"/>
    <!-- Meridian (vertical axis) -->
    <ellipse cx="0" cy="0" rx="10" ry="24" fill="none" stroke="url(#grad8)" stroke-width="1" opacity="0.3"/>
    <!-- Fingerprint-style latitude lines with organic breaks -->
    <path d="M-23,8 Q-12,12 0,10 Q12,8 22,10" fill="none" stroke="url(#grad8)" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
    <path d="M-20,-6 Q-8,-10 2,-8 Q14,-5 20,-7" fill="none" stroke="url(#grad8)" stroke-width="1.2" opacity="0.45" stroke-linecap="round"/>
    <path d="M-16,-16 Q-4,-19 6,-17 Q14,-14 18,-16" fill="none" stroke="url(#grad8)" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
    <path d="M-18,16 Q-6,20 6,18 Q14,15 18,17" fill="none" stroke="url(#grad8)" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
    <!-- Central whorl (fingerprint center) -->
    <path d="M-6,0 Q-4,-4 0,-4 Q4,-4 5,-1 Q6,2 3,4 Q0,6 -3,4" fill="none" stroke="url(#grad8)" stroke-width="1.3" opacity="0.6" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="1.5" fill="url(#grad8)" opacity="0.5"/>
  </g>
  <!-- Wordmark -->
  <text x="82" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="#2d3748">webfinger<tspan fill="url(#grad8)">.js</tspan></text>
</svg>