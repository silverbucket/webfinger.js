<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <title>webfinger.js - Golden Path Discovery</title>
  <defs>
    <linearGradient id="grad18g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2bb03"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
    <linearGradient id="grad18p" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <g transform="translate(40, 40)">
    <!-- Person silhouette (left, source) -->
    <circle cx="-20" cy="-8" r="4" fill="none" stroke="url(#grad18p)" stroke-width="1.5" opacity="0.6"/>
    <path d="M-26,2 Q-26,-2 -20,-2 Q-14,-2 -14,2 L-14,6 L-26,6 Z" fill="none" stroke="url(#grad18p)" stroke-width="1.5" opacity="0.6"/>
    <!-- Dotted discovery path -->
    <circle cx="-6" cy="0" r="1" fill="url(#grad18g)" opacity="0.4"/>
    <circle cx="0" cy="-2" r="1.2" fill="url(#grad18g)" opacity="0.55"/>
    <circle cx="6" cy="-1" r="1.4" fill="url(#grad18g)" opacity="0.7"/>
    <!-- Arrow pointing to destination -->
    <path d="M10,0 L16,0" stroke="url(#grad18g)" stroke-width="2" stroke-linecap="round"/>
    <path d="M14,-3 L18,0 L14,3" fill="none" stroke="url(#grad18g)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Globe (right, destination) -->
    <circle cx="26" cy="0" r="8" fill="none" stroke="url(#grad18g)" stroke-width="1.5"/>
    <ellipse cx="26" cy="0" rx="3.5" ry="8" fill="none" stroke="url(#grad18g)" stroke-width="0.8" opacity="0.4"/>
    <line x1="18" y1="0" x2="34" y2="0" stroke="url(#grad18g)" stroke-width="0.8" opacity="0.4"/>
    <path d="M19,-4 Q26,-6 33,-4" fill="none" stroke="url(#grad18g)" stroke-width="0.6" opacity="0.3"/>
    <path d="M19,4 Q26,6 33,4" fill="none" stroke="url(#grad18g)" stroke-width="0.6" opacity="0.3"/>
  </g>
  <!-- Wordmark -->
  <text x="82" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="#3b351d">webfinger<tspan fill="url(#grad18g)">.js</tspan></text>
</svg>