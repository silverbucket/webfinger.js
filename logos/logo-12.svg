<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <title>webfinger.js - Gold &amp; Purple Fusion</title>
  <defs>
    <linearGradient id="grad12g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2bb03"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
    <linearGradient id="grad12p" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <g transform="translate(40, 40)">
    <!-- Fingerprint whorl in gold (from original) -->
    <path d="M-18,0 A18,18 0 1,1 18,0" fill="none" stroke="url(#grad12g)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <path d="M-13,-5 A14,14 0 1,1 14,-2" fill="none" stroke="url(#grad12g)" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
    <path d="M13,5 A12,12 0 1,1 -10,6" fill="none" stroke="url(#grad12p)" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <path d="M-7,-6 A9,9 0 1,1 8,-3" fill="none" stroke="url(#grad12p)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M6,4 A6,6 0 1,1 -4,5" fill="none" stroke="url(#grad12g)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <!-- Core -->
    <circle cx="0" cy="0" r="2" fill="url(#grad12p)"/>
  </g>
  <!-- Wordmark -->
  <text x="80" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="#3b351d">web<tspan fill="url(#grad12g)">finger</tspan><tspan fill="url(#grad12p)">.js</tspan></text>
</svg>