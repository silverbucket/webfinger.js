<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>webfinger.js favicon - Pointing Hand</title>
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <g transform="translate(2, 6)" fill="none" stroke="url(#grad2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
