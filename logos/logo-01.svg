<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <title>webfinger.js - Fingerprint-At Logo</title>
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <!-- Fingerprint-@ mark -->
  <g transform="translate(40, 40)">
    <!-- Outer fingerprint arcs -->
    <path d="M-20,-2 A20,20 0 0,1 18,-6" fill="none" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <path d="M-16,8 A17,17 0 0,1 -16,-8" fill="none" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <path d="M-14,-12 A16,16 0 0,1 16,-4" fill="none" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <path d="M18,6 A18,18 0 0,1 -12,14" fill="none" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <!-- Inner fingerprint arcs -->
    <path d="M-10,-8 A12,12 0 0,1 10,-6" fill="none" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M12,0 A12,12 0 0,1 -6,10" fill="none" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M-8,4 A8,8 0 0,1 -4,-6" fill="none" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <!-- Central @ symbol -->
    <text x="0" y="5" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="url(#grad1)">@</text>
  </g>
  <!-- Wordmark -->
  <text x="80" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="#2d3748">webfinger<tspan fill="url(#grad1)">.js</tspan></text>
</svg>