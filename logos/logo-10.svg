<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <title>webfinger.js - Signal Beacon Logo</title>
  <defs>
    <linearGradient id="grad10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <g transform="translate(40, 40)">
    <!-- Tower/antenna structure -->
    <line x1="0" y1="-8" x2="0" y2="24" stroke="url(#grad10)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Tower base (tripod) -->
    <line x1="0" y1="24" x2="-10" y2="32" stroke="url(#grad10)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="0" y1="24" x2="10" y2="32" stroke="url(#grad10)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <!-- Crossbar -->
    <line x1="-6" y1="16" x2="6" y2="16" stroke="url(#grad10)" stroke-width="1.5" opacity="0.4"/>
    <!-- @ beacon at top -->
    <text x="0" y="-4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="url(#grad10)">@</text>
    <!-- Signal arcs emanating from top - left -->
    <path d="M-10,-18 A14,14 0 0,1 -12,-4" fill="none" stroke="url(#grad10)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M-16,-22 A20,20 0 0,1 -20,0" fill="none" stroke="url(#grad10)" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
    <path d="M-22,-24 A26,26 0 0,1 -26,2" fill="none" stroke="url(#grad10)" stroke-width="1" stroke-linecap="round" opacity="0.15"/>
    <!-- Signal arcs - right -->
    <path d="M10,-18 A14,14 0 0,0 12,-4" fill="none" stroke="url(#grad10)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M16,-22 A20,20 0 0,0 20,0" fill="none" stroke="url(#grad10)" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
    <path d="M22,-24 A26,26 0 0,0 26,2" fill="none" stroke="url(#grad10)" stroke-width="1" stroke-linecap="round" opacity="0.15"/>
  </g>
  <!-- Wordmark -->
  <text x="82" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="#2d3748">webfinger<tspan fill="url(#grad10)">.js</tspan></text>
</svg>