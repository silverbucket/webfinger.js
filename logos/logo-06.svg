<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <title>webfinger.js - Typographic Bracket Logo</title>
  <defs>
    <linearGradient id="grad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <!-- {@ } code-style mark -->
  <text x="10" y="54" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="38" font-weight="300" fill="url(#grad6)" letter-spacing="-1">{</text>
  <text x="32" y="52" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="30" font-weight="600" fill="#2d3748">@</text>
  <text x="56" y="54" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="38" font-weight="300" fill="url(#grad6)" letter-spacing="-1">}</text>
  <!-- Divider -->
  <line x1="84" y1="22" x2="84" y2="58" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Wordmark -->
  <text x="96" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="#2d3748">webfinger<tspan fill="url(#grad6)">.js</tspan></text>
</svg>