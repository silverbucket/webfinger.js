<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <title>webfinger.js - Hand Silhouette with Network</title>
  <defs>
    <linearGradient id="grad19g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2bb03"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
    <linearGradient id="grad19p" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <g transform="translate(36, 6)">
    <!-- Simplified hand silhouette inspired by original, pointing up-right -->
    <path d="M16,58 L4,58 L4,30 C4,28 5,26 8,26 L8,14 C8,11 10,9 13,9 C16,9 18,11 18,14 L18,22 L20,12 C20,9 22,7 25,7 C28,7 30,9 30,12 L28,26 L32,14 C32,11 34,9 37,9 C40,9 42,11 42,14 L38,32 L42,22 C42,19 44,17 47,17 C50,17 52,19 52,22 L46,46 C44,54 38,58 30,58 Z"
      fill="url(#grad19g)" fill-opacity="0.12" stroke="url(#grad19g)" stroke-width="1.8" stroke-linejoin="round"/>
    <!-- Small network dots on fingertips -->
    <circle cx="13" cy="7" r="2" fill="url(#grad19p)" opacity="0.6"/>
    <circle cx="25" cy="5" r="2" fill="url(#grad19p)" opacity="0.5"/>
    <circle cx="37" cy="7" r="2" fill="url(#grad19p)" opacity="0.5"/>
    <circle cx="47" cy="15" r="2" fill="url(#grad19p)" opacity="0.4"/>
    <!-- Connection lines between fingertip dots -->
    <line x1="13" y1="7" x2="25" y2="5" stroke="url(#grad19p)" stroke-width="0.8" opacity="0.3"/>
    <line x1="25" y1="5" x2="37" y2="7" stroke="url(#grad19p)" stroke-width="0.8" opacity="0.3"/>
    <line x1="37" y1="7" x2="47" y2="15" stroke="url(#grad19p)" stroke-width="0.8" opacity="0.3"/>
    <line x1="13" y1="7" x2="37" y2="7" stroke="url(#grad19p)" stroke-width="0.5" opacity="0.15"/>
  </g>
  <!-- Wordmark -->
  <text x="98" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="#3b351d">webfinger<tspan fill="url(#grad19g)">.js</tspan></text>
</svg>